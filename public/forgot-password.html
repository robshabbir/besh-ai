<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Calva AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } } .fade-in-up { animation: fadeInUp 0.5s ease-out; }</style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: linear-gradient(135deg, #eef2ff 0%, #f9fafb 50%, #ede9fe 100%);">
    <div class="max-w-md w-full fade-in-up">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Reset your password</h1>
        <p class="text-gray-500 mt-1">Enter your email and we'll send a reset link</p>
      </div>
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8">
        <div id="form-view" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
            <input id="email" type="email" required placeholder="you@business.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div id="error" class="hidden rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm font-medium"></div>
          <button onclick="sendReset()" id="reset-btn"
            class="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition-all duration-200 shadow-sm hover:shadow-md text-sm">
            Send Reset Link
          </button>
        </div>
        <div id="success-view" class="hidden text-center py-4">
          <div class="text-4xl mb-3">📧</div>
          <h2 class="text-lg font-bold text-gray-900 mb-2">Check your email</h2>
          <p class="text-gray-500 text-sm">If an account exists with that email, we sent a reset link. Check your inbox (and spam folder).</p>
        </div>
      </div>
      <p class="text-center text-sm text-gray-500 mt-6"><a href="/login" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">← Back to login</a></p>
    </div>
  </div>
  <script>
    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('reset-btn');
      errorEl.classList.add('hidden');
      if (!email) { errorEl.textContent = 'Please enter your email.'; errorEl.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await fetch('/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
        if (!res.ok) { const data = await res.json(); throw new Error(data.error || 'Failed'); }
        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('success-view').classList.remove('hidden');
      } catch (e) { errorEl.textContent = e.message; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Send Reset Link'; }
    }
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });
  </script>
</body>
</html>
