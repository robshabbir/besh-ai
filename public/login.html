<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Calva AI Receptionist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: linear-gradient(135deg, #eef2ff 0%, #f9fafb 50%, #ede9fe 100%);">
    <div class="max-w-md w-full fade-in-up">
      <!-- Branding -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </div>
        <a href="/" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium mb-2 inline-block">← Back to Calva.ai</a>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h1>
        <p class="text-gray-500 mt-1">Sign in to your Calva dashboard</p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8">
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
            <input id="email" type="email" required placeholder="you@business.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <div class="relative">
              <input id="password" type="password" required placeholder="••••••••"
                class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
              <button type="button" onclick="togglePassword()" id="pw-toggle" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors" aria-label="Toggle password visibility">
                <svg id="pw-eye" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg id="pw-eye-off" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
          </div>
          <div id="error" class="hidden rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm font-medium"></div>
          <button onclick="login()" id="login-btn"
            class="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition-all duration-200 shadow-sm hover:shadow-md text-sm">
            Sign in
          </button>
        </div>
      </div>

      <div class="text-center mt-6 space-y-2">
        <p class="text-sm text-gray-500">Don't have an account? <a href="/onboard.html" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">Sign up</a></p>
        <p class="text-sm"><a href="/forgot-password" class="text-gray-400 hover:text-indigo-600 transition-colors">Forgot your password?</a></p>
      </div>
    </div>
  </div>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const eyeOn = document.getElementById('pw-eye');
      const eyeOff = document.getElementById('pw-eye-off');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOn.classList.add('hidden');
        eyeOff.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOn.classList.remove('hidden');
        eyeOff.classList.add('hidden');
      }
    }
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('login-btn');
      errorEl.classList.add('hidden');
      if (!email || !password) { errorEl.textContent = 'Please fill in all fields.'; errorEl.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) { errorEl.textContent = data.error; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Sign in'; return; }
        window.location.href = '/dashboard/';
      } catch (e) { errorEl.textContent = 'Network error — please try again.'; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Sign in'; }
    }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>
</html>
