<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Calva AI Receptionist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: linear-gradient(135deg, #eef2ff 0%, #f9fafb 50%, #ede9fe 100%);">
    <div class="max-w-md w-full fade-in-up">
      <!-- Branding -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h1>
        <p class="text-gray-500 mt-1">Sign in to your Calva dashboard</p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8">
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
            <input id="email" type="email" required placeholder="you@business.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <input id="password" type="password" required placeholder="••••••••"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div id="error" class="hidden rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm font-medium"></div>
          <button onclick="login()" id="login-btn"
            class="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition-all duration-200 shadow-sm hover:shadow-md text-sm">
            Sign in
          </button>
        </div>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6">Don't have an account? <a href="/onboard.html" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">Sign up</a></p>
    </div>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('login-btn');
      errorEl.classList.add('hidden');
      if (!email || !password) { errorEl.textContent = 'Please fill in all fields.'; errorEl.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) { errorEl.textContent = data.error; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Sign in'; return; }
        window.location.href = '/dashboard/';
      } catch (e) { errorEl.textContent = 'Network error — please try again.'; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Sign in'; }
    }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>
</html>
