<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Besh — Your AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --surface-2: #2c2c2e;
      --surface-3: #3a3a3c;
      --text: #ffffff;
      --text-secondary: #8e8e93;
      --text-tertiary: #636366;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --user-bubble: #6366f1;
      --ai-bubble: #2c2c2e;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 2px 16px rgba(0,0,0,0.3);
      --radius: 20px;
      --radius-sm: 12px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== MESSAGES ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .messages::-webkit-scrollbar { width: 0; }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.4;
      letter-spacing: -0.01em;
      word-wrap: break-word;
      animation: messageIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom;
    }

    @keyframes messageIn {
      0% { opacity: 0; transform: scale(0.92) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--ai-bubble);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
      padding: 0 4px;
    }

    .message-time.user { text-align: right; }
    .message-time.ai { text-align: left; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
      background: var(--ai-bubble);
      border-radius: var(--radius);
      border-bottom-left-radius: 6px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ===== DATE SEPARATOR ===== */
    .date-sep {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
      padding: 12px 0 8px;
    }

    /* ===== INPUT ===== */
    .input-area {
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border-radius: 24px;
      padding: 4px 4px 4px 16px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .input-row textarea {
      flex: 1;
      border: none;
      background: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.4;
      resize: none;
      outline: none;
      padding: 8px 0;
      max-height: 100px;
      min-height: 24px;
    }

    .input-row textarea::placeholder {
      color: var(--text-tertiary);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
      opacity: 0.4;
      transform: scale(0.9);
    }

    .send-btn.active {
      opacity: 1;
      transform: scale(1);
    }

    .send-btn:active { transform: scale(0.92); }

    .send-btn svg {
      width: 18px;
      height: 18px;
      margin-left: 1px;
    }

    /* ===== WELCOME STATE ===== */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 16px;
      text-align: center;
    }

    .welcome-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .welcome p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 280px;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .quick-action {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-action:hover {
      background: var(--surface-2);
      border-color: var(--accent);
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 481px) {
      .app {
        margin-top: 24px;
        height: calc(100vh - 48px);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
    }

    /* Dark mode only (already dark) */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f2f2f7;
        --surface: #ffffff;
        --surface-2: #f2f2f7;
        --text: #000000;
        --text-secondary: #8e8e93;
        --text-tertiary: #aeaeb2;
        --ai-bubble: #e9e9eb;
        --border: rgba(0,0,0,0.08);
        --shadow: 0 2px 16px rgba(0,0,0,0.08);
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <div class="header">
      <div class="header-avatar">B</div>
      <div class="header-info">
        <div class="header-name">Besh</div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✨</div>
        <h2>Hey there</h2>
        <p>I'm Besh, your personal AI assistant. I help you set goals, stay on track, and get things done.</p>
        <div class="quick-actions">
          <button class="quick-action" data-msg="Set a goal for this week">🎯 Set a goal</button>
          <button class="quick-action" data-msg="How am I doing?">📊 Check in</button>
          <button class="quick-action" data-msg="Remind me to exercise at 6pm">⏰ Set reminder</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Message Besh..." autocomplete="off" autofocus></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeEl = document.getElementById('welcome');

    let sessionId = null;
    let apiKey = null;
    const API_BASE = '/api';

    // Try to get API key from URL params or localStorage
    const params = new URLSearchParams(window.location.search);
    apiKey = params.get('key') || localStorage.getItem('besh_api_key');
    if (apiKey) localStorage.setItem('besh_api_key', apiKey);

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
      sendBtn.classList.toggle('active', inputEl.value.trim().length > 0);
    });

    // Send on Enter (shift+enter for newline)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // Quick actions
    document.querySelectorAll('.quick-action').forEach(btn => {
      btn.addEventListener('click', () => {
        inputEl.value = btn.dataset.msg;
        sendBtn.classList.add('active');
        sendMessage();
      });
    });

    function formatTime() {
      return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function addMessage(text, sender) {
      if (welcomeEl) {
        welcomeEl.style.display = 'none';
      }

      const msgEl = document.createElement('div');
      msgEl.className = `message ${sender}`;
      msgEl.textContent = text;
      messagesEl.appendChild(msgEl);

      const timeEl = document.createElement('div');
      timeEl.className = `message-time ${sender}`;
      timeEl.textContent = formatTime();
      messagesEl.appendChild(timeEl);

      scrollToBottom();
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.id = 'typing';
      el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.classList.remove('active');

      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch(`${API_BASE}/besh/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            sessionId,
            
          })
        });

        const data = await res.json();
        hideTyping();

        if (data.response) {
          sessionId = data.sessionId || sessionId;
          addMessage(data.response, 'ai');
        } else {
          addMessage("Hmm, I didn't catch that. Try again?", 'ai');
        }
      } catch (err) {
        hideTyping();
        addMessage("Connection hiccup — try sending that again.", 'ai');
      }

      inputEl.focus();
    }
  </script>
</body>
</html>
