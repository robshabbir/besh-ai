<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Calva AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } } .fade-in-up { animation: fadeInUp 0.5s ease-out; }</style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: linear-gradient(135deg, #eef2ff 0%, #f9fafb 50%, #ede9fe 100%);">
    <div class="max-w-md w-full fade-in-up">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Set new password</h1>
        <p class="text-gray-500 mt-1">Choose a strong password for your account</p>
      </div>
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8">
        <div id="form-view" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">New Password</label>
            <input id="password" type="password" required minlength="6" placeholder="At least 6 characters"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm Password</label>
            <input id="confirm" type="password" required placeholder="Type it again"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 text-sm placeholder-gray-400">
          </div>
          <div id="error" class="hidden rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm font-medium"></div>
          <button onclick="resetPassword()" id="reset-btn"
            class="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition-all duration-200 shadow-sm hover:shadow-md text-sm">
            Reset Password
          </button>
        </div>
        <div id="success-view" class="hidden text-center py-4">
          <div class="text-4xl mb-3">✅</div>
          <h2 class="text-lg font-bold text-gray-900 mb-2">Password reset!</h2>
          <p class="text-gray-500 text-sm mb-4">Your password has been updated successfully.</p>
          <a href="/login" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-all text-sm">Sign in</a>
        </div>
        <div id="expired-view" class="hidden text-center py-4">
          <div class="text-4xl mb-3">⏰</div>
          <h2 class="text-lg font-bold text-gray-900 mb-2">Link expired</h2>
          <p class="text-gray-500 text-sm mb-4">This reset link is invalid or has expired.</p>
          <a href="/forgot-password" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-all text-sm">Request new link</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { document.getElementById('form-view').classList.add('hidden'); document.getElementById('expired-view').classList.remove('hidden'); }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('reset-btn');
      errorEl.classList.add('hidden');
      if (password.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; errorEl.classList.remove('hidden'); return; }
      if (password !== confirm) { errorEl.textContent = 'Passwords do not match.'; errorEl.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Resetting…';
      try {
        const res = await fetch('/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('success-view').classList.remove('hidden');
      } catch (e) {
        if (e.message.includes('expired') || e.message.includes('Invalid')) {
          document.getElementById('form-view').classList.add('hidden');
          document.getElementById('expired-view').classList.remove('hidden');
        } else { errorEl.textContent = e.message; errorEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Reset Password'; }
      }
    }
    document.getElementById('confirm')?.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
  </script>
</body>
</html>
