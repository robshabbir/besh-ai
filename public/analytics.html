<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Besh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <a href="/dashboard/" class="text-gray-400 hover:text-indigo-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          </a>
          <h1 class="text-2xl font-bold text-gray-900">Analytics</h1>
        </div>
        <p class="text-sm text-gray-500">Track your call performance and trends</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="dateRange" onchange="loadAnalytics()" class="px-4 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-all duration-200">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
        </select>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-medium text-gray-500">Calls Today</p>
          <div class="w-9 h-9 rounded-lg bg-indigo-50 flex items-center justify-center">
            <svg class="w-4.5 h-4.5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          </div>
        </div>
        <p id="today" class="text-3xl font-bold text-gray-900">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-medium text-gray-500">This Week</p>
          <div class="w-9 h-9 rounded-lg bg-indigo-50 flex items-center justify-center">
            <svg class="w-4.5 h-4.5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          </div>
        </div>
        <p id="thisWeek" class="text-3xl font-bold text-indigo-600">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-medium text-gray-500">Avg Duration</p>
          <div class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center">
            <svg class="w-4.5 h-4.5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
        </div>
        <p id="avgDuration" class="text-3xl font-bold text-gray-900">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-medium text-gray-500">Top Intent</p>
          <div class="w-9 h-9 rounded-lg bg-green-50 flex items-center justify-center">
            <svg class="w-4.5 h-4.5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
          </div>
        </div>
        <p id="topIntent" class="text-3xl font-bold text-gray-900 capitalize">—</p>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <h2 class="text-base font-semibold text-gray-900 mb-1">Daily Call Volume</h2>
        <p class="text-sm text-gray-500 mb-4">Last 7 days</p>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow duration-200">
        <h2 class="text-base font-semibold text-gray-900 mb-1">Peak Hours</h2>
        <p class="text-sm text-gray-500 mb-4">When your calls come in</p>
        <canvas id="hourlyChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    let dailyChartInstance = null;
    let hourlyChartInstance = null;

    async function loadAnalytics() {
      const me = await fetch('/auth/me').then(r => r.json()).catch(() => null);
      if (!me?.user) return location.href = '/login.html';

      const data = await fetch('/api/dashboard/analytics').then(r => r.json());

      document.getElementById('today').textContent = data.today;
      document.getElementById('thisWeek').textContent = data.thisWeek;
      document.getElementById('avgDuration').textContent = data.avgDuration + 's';
      document.getElementById('topIntent').textContent = data.topIntent || '—';

      const dailyLabels = (data.dailyVolume || []).map(d => d.date).reverse();
      const dailyData = (data.dailyVolume || []).map(d => d.count).reverse();

      if (dailyChartInstance) dailyChartInstance.destroy();
      dailyChartInstance = new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: {
          labels: dailyLabels,
          datasets: [{
            label: 'Calls',
            data: dailyData,
            backgroundColor: 'rgba(79, 70, 229, 0.75)',
            hoverBackgroundColor: 'rgba(79, 70, 229, 0.9)',
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } } }
      });

      const hours = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0'));
      const hourMap = Object.fromEntries((data.hourlyDistribution || []).map(h => [h.hour, h.count]));

      if (hourlyChartInstance) hourlyChartInstance.destroy();
      hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
        type: 'bar',
        data: {
          labels: hours.map(h => h + ':00'),
          datasets: [{
            label: 'Calls',
            data: hours.map(h => hourMap[h] || 0),
            backgroundColor: hours.map(h => (hourMap[h] || 0) > 0 ? 'rgba(16, 185, 129, 0.75)' : 'rgba(229, 231, 235, 0.4)'),
            hoverBackgroundColor: hours.map(h => (hourMap[h] || 0) > 0 ? 'rgba(16, 185, 129, 0.9)' : 'rgba(229, 231, 235, 0.6)'),
            borderRadius: 6,
            borderSkipped: false,
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } } }
      });
    }

    loadAnalytics();
  </script>
</body>
</html>
